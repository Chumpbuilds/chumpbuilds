# X87 Player - Complete Nginx Configuration (SSL ENABLED)
# Current Date and Time (UTC): 2025-11-23 09:35:00
# Current User: covchump

# ----------------------------------------------------------------------
# 1. HTTP REDIRECTS (Port 80 -> 443)
# ----------------------------------------------------------------------
server {
    listen 80;
    server_name x87player.xyz www.x87player.xyz admin.x87player.xyz portal.x87player.xyz;
    return 301 https://$host$request_uri;
}

# ----------------------------------------------------------------------
# 2. MAIN WEBSITE (Home Page + API Fix)
# ----------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name x87player.xyz www.x87player.xyz;

    # SSL Certificates (From your setup_home.py)
    ssl_certificate /etc/letsencrypt/live/x87player.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/x87player.xyz/privkey.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # FIX: Route API requests to Admin Service (Port 5000)
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';
    }

    # Route everything else to Home Service (Port 5002)
    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        proxy_pass http://127.0.0.1:5002/static/;
    }
}

# ----------------------------------------------------------------------
# 3. ADMIN PANEL (Port 5000)
# ----------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name admin.x87player.xyz;

    ssl_certificate /etc/letsencrypt/live/x87player.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/x87player.xyz/privkey.pem;

    # Main Admin App
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ----------------------------------------------------------------------
# 4. CUSTOMER PORTAL (Port 5001)
# ----------------------------------------------------------------------
server {
    listen 443 ssl http2;
    server_name portal.x87player.xyz;

    ssl_certificate /etc/letsencrypt/live/x87player.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/x87player.xyz/privkey.pem;

    # Portal App
    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ----------------------------------------------------------------------
# 5. DIRECT IP ACCESS (Fallback)
# ----------------------------------------------------------------------
server {
    listen 80;
    server_name 217.154.17.128;

    location /api/license/ {
        proxy_pass http://127.0.0.1:5000/api/license/;
        proxy_set_header Host admin.x87player.xyz;
    }

    location / {
        return 301 https://x87player.xyz$request_uri;
    }
}