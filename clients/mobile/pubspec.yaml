name: x87_mobile
description: X87 IPTV Player - Mobile client for Android and iOS
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.3.0
  shared_preferences: ^2.3.0
  device_info_plus: ^11.0.0
  crypto: ^3.0.6
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  flutter_vlc_player: ^7.4.2
  android_intent_plus: ^5.1.0
  video_player: ^2.9.2
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  remove_alpha_ios: true
